services:
  db:
    image: postgis/postgis:16-3.4
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gabai}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gabai}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/gabai/nest/Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-gabai}?schema=public
      REDIS_URL: redis://redis:6379
      ML_SIDECAR_URL: http://ml:8000
      NODE_ENV: ${NODE_ENV:-development}
      PORT: '3000'

  web:
    build:
      context: .
      dockerfile: apps/gabai/web/Dockerfile
    ports:
      - '4200:4200'
    depends_on:
      - api
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}

  ml:
    build:
      context: .
      dockerfile: apps/gabai/sidecar/Dockerfile
    ports:
      - '8000:8000'
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-gabai}?schema=public
      NESTJS_INTERNAL_URL: http://api:3000

volumes:
  postgres_data:
